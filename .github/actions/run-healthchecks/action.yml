name: 'Run Health Checks'
description: 'Run Playwright health checks against specified base URL'

inputs:
  base_url:
    description: 'Base URL to run health checks against'
    required: true
  environment_name:
    description: 'Environment name for artifact naming'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Wake up site
      shell: bash
      run: |
        curl -s --max-time 30 -o /dev/null "${{ inputs.base_url }}" &

    - name: Setup pnpm
      uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4

    - name: Setup Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
      with:
        node-version: '20'
        cache: 'pnpm'

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile --ignore-scripts

    - name: Get Playwright version
      id: playwright-version
      shell: bash
      run: echo "version=$(node -p "require('./package.json').devDependencies['@playwright/test']")" >> $GITHUB_OUTPUT

    - name: Run health checks in Docker
      shell: bash
      env:
        TEST_BASE_URL: ${{ inputs.base_url }}
      run: |
        IMAGE="mcr.microsoft.com/playwright:v${{ steps.playwright-version.outputs.version }}"

        for attempt in 1 2 3; do
          if docker pull "$IMAGE"; then
            break
          fi

          if [ "$attempt" -eq 3 ]; then
            echo "Failed to pull $IMAGE after $attempt attempts"
            exit 1
          fi

          sleep_seconds=$((attempt * 10))
          echo "Pull attempt $attempt failed, retrying in ${sleep_seconds}s"
          sleep "$sleep_seconds"
        done

        docker run --rm \
          -v ${{ github.workspace }}:/work \
          -w /work \
          -e TEST_BASE_URL="${TEST_BASE_URL}" \
          -e CI=true \
          -e PW_TEST_HTML_REPORT_OPEN=never \
          --network host \
          "$IMAGE" \
          bash -c "npx playwright test --reporter=list --reporter=html"

    - name: Upload test results
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
      if: always()
      with:
        name: playwright-results-${{ inputs.environment_name }}
        path: |
          playwright-report/
          test-results/
        retention-days: 30

    - name: View Test Report command
      if: failure()
      shell: bash
      run: |
        echo -e "::notice::To view the Playwright report locally, run:\n\nREPORT_DIR=\$(mktemp -d) && gh run download ${{ github.run_id }} -n playwright-results-${{ inputs.environment_name }} -D \"\$REPORT_DIR\" && npx playwright show-report \"\$REPORT_DIR/playwright-report\""
