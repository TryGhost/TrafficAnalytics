name: "Docker build"
description: "Build docker image of project"

inputs:
  node-version:
    description: The node version to build the image on
    required: true
  image-name:
    description: What to tag the built image as
    required: true
    default: traffic-analytics
  build-multiarchitecture:
    description: Wether to build a multi-architecture image or not
    required: true
    default: 'false'

outputs:
  production-image-name:
    description: The tag used for the built production image
    value: ${{ inputs.image-name }}:latest
  base-image-name:
    description: The tag used for the built base image
    value: ${{ inputs.image-name }}:base

runs:
  using: composite
  steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

    - name: Set up Docker
      uses: docker/setup-docker-action@6d7cfa65f60a9dda7b46e5513fa982536f3c9877 # v5
      if: inputs.build-multiarchitecture == 'true'
      with:
        daemon-config: |
          {
            "debug": true,
            "features": {
              "containerd-snapshotter": true
            }
          }

    - name: Setup QEMU
      uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4
      if: inputs.build-multiarchitecture == 'true'

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      if: inputs.build-multiarchitecture == 'true'

    - name: Get tree SHA
      id: tree
      shell: bash
      run: echo "sha=$(git rev-parse HEAD^{tree})" >> $GITHUB_OUTPUT

    - name: Build base docker image
      id: build-base-docker-image
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
      with:
        context: .
        target: base
        tags: ${{ inputs.image-name }}:base
        build-args: |
          NODE_VERSION=${{ inputs.node-version }}
          BUILD_LABEL=${{ steps.tree.outputs.sha }}
        platforms: ${{ inputs.build-multiarchitecture == 'true' && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
        load: true

    - name: Build production docker image
      id: build-production-docker-image
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
      with:
        context: .
        tags: ${{ inputs.image-name }}:latest
        build-args: |
          NODE_VERSION=${{ inputs.node-version }}
          BUILD_LABEL=${{ steps.tree.outputs.sha }}
        platforms: ${{ inputs.build-multiarchitecture == 'true' && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
        load: true

    - name: Smoke test production docker image
      shell: bash
      run: |
        set -euo pipefail

        image="${{ inputs.image-name }}:latest"
        container_id=$(docker run -d \
          -e PORT=3000 \
          -e ENABLE_SALT_CLEANUP_SCHEDULER=false \
          -p 127.0.0.1::3000 \
          "$image")

        cleanup() {
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "Smoke test failed. Container logs:"
            docker logs "$container_id" || true
          fi
          docker rm -f "$container_id" >/dev/null 2>&1 || true
          exit "$status"
        }
        trap cleanup EXIT

        host_port=$(docker inspect --format='{{(index (index .NetworkSettings.Ports "3000/tcp") 0).HostPort}}' "$container_id")

        for attempt in {1..30}; do
          if curl -fsS --max-time 2 "http://127.0.0.1:${host_port}/" >/dev/null; then
            echo "Production image smoke test passed."
            exit 0
          fi

          if [ "$(docker inspect --format='{{.State.Running}}' "$container_id")" != "true" ]; then
            echo "Container exited before becoming healthy."
            exit 1
          fi

          echo "Waiting for production image to become healthy (${attempt}/30)..."
          sleep 1
        done

        echo "Timed out waiting for production image to become healthy."
        exit 1
